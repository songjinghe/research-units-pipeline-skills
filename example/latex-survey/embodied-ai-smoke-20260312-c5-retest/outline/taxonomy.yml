- name: Problem Settings & Embodiment
  description: 'Task settings, embodiment assumptions, and interface choices that define what an embodied system can observe,
    decide, and execute. Representative paper_id(s): P0089, P0179, P0204, P0214.'
  children:
  - name: Manipulation, navigation, and task scope
    description: How the literature separates manipulation, navigation, mobile manipulation, and broader service-robot settings,
      and what these settings demand from the agent.
  - name: Observation, action, and embodiment interfaces
    description: Perception channels, action spaces, control frequency, sensor layouts, and embodiment-specific interfaces
      that constrain transfer and robustness.
- name: Model & Policy Architectures
  description: 'Core architectural choices for embodied AI, including VLA systems, policy backbones, and world-model-based
    control. Representative paper_id(s): P0002, P0018, P0023, P0088.'
  children:
  - name: Vision-language-action and policy backbones
    description: VLA-style backbones, action tokenization, policy heads, and how language/vision context is turned into executable
      robot actions.
  - name: World models, planning, and reasoning
    description: World-model-based control, planning, memory, and reasoning mechanisms used for long-horizon or partially
      observed embodied tasks.
  - name: Transfer across embodiments and viewpoints
    description: Cross-robot, cross-camera, and cross-environment adaptation, including calibration, viewpoint robustness,
      and embodiment transfer.
- name: Data, Training & Post-Training
  description: 'How embodied systems are trained, adapted, and improved using demonstrations, simulation, human videos, and
    feedback. Representative paper_id(s): P0014, P0032, P0033, P0059.'
  children:
  - name: Pretraining data and supervision
    description: Data sources, supervision strategies, simulation vs real-world mixtures, and how dataset composition shapes
      generalization.
  - name: Post-training, feedback, and continual improvement
    description: Post-training, feedback-driven updates, policy improvement, and continual adaptation under real-world or
      in-context constraints.
- name: Evaluation, Safety & Deployment
  description: 'Evaluation, safety, and deployment constraints for embodied AI systems in real or realistic robot settings.
    Representative paper_id(s): P0185, P0196, P0103, P0109.'
  children:
  - name: Benchmarks, metrics, and generalization
    description: Benchmark suites, task coverage, success metrics, generalization tests, and the difference between short-horizon
      wins and robust embodied competence.
  - name: Safety, reliability, and real-world deployment
    description: Safety alignment, reliability, execution failures, sim-to-real gaps, and practical deployment constraints
      for embodied systems.
