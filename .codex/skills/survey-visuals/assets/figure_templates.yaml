# Figure archetype templates for survey-visuals.
# The script reads these to generate figure spec skeletons.
# Add new archetypes here without changing run.py.

archetypes:
  - id: pipeline_dataflow
    label: "Pipeline + Dataflow"
    purpose: "Help readers understand where evidence comes from and how sections are grounded."
    default_elements:
      - "queries → raw set"
      - "dedupe/rank"
      - "taxonomy"
      - "outline + mapping"
      - "notes → claim-evidence matrix"
      - "draft → LaTeX/PDF"
    min_citations: 2

  - id: taxonomy_view
    label: "Taxonomy / Design Space View"
    purpose: "Provide a navigable mental model of the design space before details."
    default_elements:
      - "top-level chapters"
      - "leaf subtopics"
      - "2–3 cited exemplars per leaf"
      - "arrows for common trade-offs"
    min_citations: 3

  - id: comparison_matrix
    label: "Comparison Matrix"
    purpose: "Make quantitative/qualitative differences across works scannable."
    default_elements:
      - "rows = representative works"
      - "columns = comparison axes (method, benchmark, metric)"
    min_citations: 5

  - id: evolution_timeline
    label: "Evolution / Timeline"
    purpose: "Show how the field developed over time with cited milestones."
    default_elements:
      - "year-anchored milestone bullets"
      - "theme grouping (optional)"
    min_citations: 4
