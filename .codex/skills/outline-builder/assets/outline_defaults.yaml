intro_section:
  id: '1'
  title: Introduction
  bullets:
    - 'Intent: motivate the topic, set scope boundaries, and explain why the survey is needed now.'
    - 'RQ: What is the survey scope and what reader questions will the taxonomy answer?'
    - 'Evidence needs: define key terms; position the topic against adjacent literature; summarize what evidence will be compared later.'
    - 'Expected cites: >=10 across intro + background (surveys, seminal works, widely used benchmarks).'
    - 'Structure: preview the taxonomy and how later sections map to evidence and comparisons.'
related_work_section:
  id: '2'
  title: Related Work
  bullets:
    - 'Intent: position this survey relative to adjacent lines of work and existing surveys/reviews.'
    - 'RQ: What does this survey add beyond existing overviews in structure, evidence policy, or comparison lens?'
    - 'Evidence needs: cite adjacent surveys/reviews, foundational works, scope boundaries, and terminology decisions.'
    - 'Expected cites: >=10 across surveys/reviews, seminal works, and representative benchmarks when relevant.'
    - 'Structure: explain how the taxonomy differs from common organization schemes and why it supports deeper comparisons.'
section_defaults:
  intent: 'Intent: define the design space for {title} and provide cross-subsection comparisons.'
  rq: 'RQ: What is the organizing logic of {title}, and which comparisons are most decision-relevant?'
  scope_cues: 'Scope cues: {hint_short}'
  evidence_needs: 'Evidence needs: representative methods; evaluation protocols; known failure modes; connections to adjacent chapters.'
  expected_cites: 'Expected cites: each subsection >=3; chapter total should be high enough to support evidence-first synthesis.'
  chapter_lead_plan: 'Chapter lead plan: later write a short (2–3 paragraph) lead that previews the key comparison axes and how the H3 subsections connect.'
subsection_defaults:
  intent: 'Intent: explain what belongs in {title} (within {parent}) and how it differs from neighboring subtopics.'
  rq: 'RQ: Which design choices in {title} drive the major trade-offs, and how are those trade-offs measured?'
  scope_cues: 'Scope cues: {hint_short}'
  evidence_needs: 'Evidence needs: core mechanism and system architecture, training and data setup, evaluation protocol (datasets, metrics, human evaluation), compute and latency constraints, and failure modes and limitations.'
  expected_cites: 'Expected cites: >=3 (H3); include >=1 canonical or seminal work and >=1 recent representative work when possible.'
  concrete_comparisons: 'Concrete comparisons: identify >=2 explicit A vs B contrasts (mechanism or protocol) that the subsection must cover.'
  evaluation_anchors: 'Evaluation anchors: name 1-3 benchmarks, datasets, metrics, or protocols that will appear in the subsection.'
comparison_axis_packs:
  - name: multi_agent_coordination
    keywords: [multi-agent, coordination, debate, collaboration, swarm, role specialization]
    bullet: 'Comparison axes: communication protocol/roles; aggregation (vote/debate/referee); stability/robustness; evaluation protocol (coordination success, cost); failure modes.'
  - name: adaptation
    keywords: [reflection, self-improvement, adaptation, critique, revision, reward hacking, preference optimization]
    bullet: 'Comparison axes: update signal (reflection/feedback/reward); optimization target; stability vs drift; evaluation protocol (improvement over iterations); failure modes.'
  - name: safety_security
    keywords: [security, secure, attack, threat, guardrail, injection, exfiltration, governance, tool abuse, monitoring]
    bullet: 'Comparison axes: threat model; defense surface (policy/sandbox/monitoring); security evaluation protocol; robustness vs capability trade-offs; failure modes.'
  - name: evaluation_protocols
    keywords: [benchmark, evaluation, protocol, dataset, metric, reproducibility, human evaluation]
    bullet: 'Comparison axes: task coverage; metric validity; human vs automated evaluation; reproducibility/leakage controls; reporting cost and latency.'
  - name: memory_retrieval
    keywords: [memory, retrieval, rag, cache, long-horizon, grounding]
    bullet: 'Comparison axes: memory type (episodic/semantic/scratchpad); retrieval source/index; write/update/forgetting policy; evaluation protocol (long-horizon success, cost); failure modes.'
  - name: planning_reasoning
    keywords: [plan, planning, reason, reasoning, search, thought, tree, mcts, decomposition, verification]
    bullet: 'Comparison axes: control-loop design (planner/executor); deliberation/search method; action grounding (tools vs environment); evaluation protocol (success, cost, latency); failure modes.'
  - name: tool_interface
    keywords: [tool, tool-use, function, mcp, protocol, interface, orchestration, api, sandbox]
    bullet: 'Comparison axes: tool interface contract (schemas/protocols); tool selection/routing policy; sandboxing/permissions/observability; evaluation protocol (tasks, metrics, budget); failure modes.'
fallback_comparison_axes: 'Comparison axes: core mechanism/architecture; training/data/supervision; evaluation protocol (datasets, metrics, human eval); efficiency (compute, latency, cost); failure modes.'
